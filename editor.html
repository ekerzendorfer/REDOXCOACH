<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDOX-COACH | Editor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #334e68; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #0f172a; margin-bottom: 5px; }
        .editor-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #475569; }
        input, select { padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: #3b82f6; }
        
        h3 { grid-column: 1 / -1; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; margin-top: 10px; color: #1e293b; }
        
        .btn-generate { grid-column: 1 / -1; background-color: #10b981; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-generate:hover { background-color: #059669; }
        .btn-back { background-color: transparent; border: 2px solid #94a3b8; color: #64748b; padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .btn-back:hover { background-color: #f1f5f9; color: #334e68; }

        .output-area { margin-top: 20px; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 2px solid #cbd5e1; border-radius: 8px; font-family: monospace; font-size: 14px; background-color: #f1f5f9; resize: vertical; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">⬅ Zurück zur App</a>

    <div class="header">
        <h1>🛠️ Editor (JSON-Generator)</h1>
        <p>Neue Gleichungen für die Datenbank erstellen</p>
    </div>

    <div class="editor-container">
        <div class="form-grid">
            <h3>1. Allgemeine Infos</h3>
            <div class="form-group">
                <label>ID (Nummer)</label>
                <input type="number" id="eq-id" placeholder="z.B. 30" value="30">
            </div>
            <div class="form-group">
                <label>Schwierigkeitsgrad</label>
                <select id="eq-diff">
                    <option value="sehr leicht">sehr leicht</option><option value="leicht">leicht</option><option value="mittel">mittel</option>
                    <option value="gehoben">gehoben</option><option value="anspruchsvoll">anspruchsvoll</option><option value="sehr anspruchsvoll">sehr anspruchsvoll</option>
                </select>
            </div>

            <h3>2. Die Moleküle (Format z.B. MnO4-, Cu2+, Cr2O7^2-)</h3>
            <div class="form-group"><label>Oxidationsmittel (Edukt 1)</label><input type="text" id="r1" placeholder="z.B. MnO4-"></div>
            <div class="form-group"><label>Reduktionsmittel (Edukt 2)</label><input type="text" id="r2" placeholder="z.B. Fe2+"></div>
            <div class="form-group"><label>Produkt aus Ox-Mittel</label><input type="text" id="p1" placeholder="z.B. Mn2+"></div>
            <div class="form-group"><label>Produkt aus Red-Mittel</label><input type="text" id="p2" placeholder="z.B. Fe3+"></div>

            <h3>3. Stöchiometrie (kgV & Faktoren)</h3>
            <div class="form-group"><label>kgV Elektronen (Reduktion)</label><input type="number" id="e-red" placeholder="z.B. 5"></div>
            <div class="form-group"><label>kgV Elektronen (Oxidation)</label><input type="number" id="e-ox" placeholder="z.B. 5"></div>
            <div class="form-group"><label>Faktor für Ox-Mittel (vorne)</label><input type="number" id="f-ox" placeholder="z.B. 1"></div>
            <div class="form-group"><label>Faktor für Red-Mittel (vorne)</label><input type="number" id="f-red" placeholder="z.B. 5"></div>

            <button class="btn-generate" onclick="generateJSON()">⬇ JSON-Code generieren ⬇</button>
        </div>

        <div class="output-area">
            <label>Fertiger JSON-Code (Einfach kopieren und in die redox_db.json einfügen):</label>
            <textarea id="json-output" readonly placeholder="Hier erscheint der Code..."></textarea>
        </div>
    </div>

    <script>
        // Der Parser, der die Chemie-Logik aus unserem Python-Skript ins Web bringt!
        function parseFormulaCharge(raw) {
            let base = raw.trim(); let charge = "0";
            if(base.includes('^')) {
                let parts = base.split('^'); base = parts[0];
                let c = parts[1].replace('+','').replace('-','');
                let sign = parts[1].includes('-') ? '-' : '+';
                charge = sign + (c==='' ? '1' : c);
            } else if(base.endsWith('+') || base.endsWith('-')) {
                let sign = base.slice(-1);
                let match = base.match(/^([A-Za-z]+)(\d+)[+-]$/);
                if(match) { base = match[1]; charge = sign + match[2]; }
                else { base = base.slice(0, -1); charge = sign + "1"; }
            }
            return {base, charge};
        }

        function parseAtoms(base) {
            let atoms = [];
            let matches = [...base.matchAll(/([A-Z][a-z]*)(\d*)/g)];
            matches.forEach(m => {
                atoms.push({symbol: m[1], count: parseInt(m[2] || 1)});
            });
            return atoms;
        }

        function calculateOZ(atoms, charge) {
            let cVal = parseInt(charge);
            if(atoms.length === 1) return [{...atoms[0], oz: cVal===0 ? "0" : (cVal>0?"+"+cVal:cVal.toString())}];
            let o = atoms.find(a=>a.symbol==='O'); let oCount = o?o.count:0;
            let h = atoms.find(a=>a.symbol==='H'); let hCount = h?h.count:0;
            return atoms.map(a => {
                if(a.symbol==='O') return {...a, oz: "-2"};
                if(a.symbol==='H') return {...a, oz: "+1"};
                let remain = cVal - (oCount*-2 + hCount*1);
                let ozVal = remain / a.count;
                let ozStr = ozVal>0 ? "+"+ozVal : ozVal.toString();
                if(ozStr === "0") ozStr = "0";
                return {...a, oz: ozStr};
            });
        }

        function buildSpecies(rawFormula) {
            let {base, charge} = parseFormulaCharge(rawFormula);
            let atoms = parseAtoms(base);
            let atomsWithOZ = calculateOZ(atoms, charge);
            return { formula_text: base, charge: charge, atoms: atomsWithOZ };
        }

        function generateJSON() {
            try {
                let entry = {
                    id: parseInt(document.getElementById('eq-id').value),
                    difficulty: document.getElementById('eq-diff').value,
                    agents: {
                        ox_mittel: document.getElementById('r1').value,
                        red_mittel: document.getElementById('r2').value
                    },
                    equation: {
                        reactants: [
                            buildSpecies(document.getElementById('r1').value),
                            buildSpecies(document.getElementById('r2').value)
                        ],
                        products: [
                            buildSpecies(document.getElementById('p1').value),
                            buildSpecies(document.getElementById('p2').value)
                        ]
                    },
                    electrons: {
                        ox_half_e: parseInt(document.getElementById('e-ox').value),
                        red_half_e: parseInt(document.getElementById('e-red').value)
                    },
                    factors: {
                        ox_factor: parseInt(document.getElementById('f-ox').value),
                        red_factor: parseInt(document.getElementById('f-red').value)
                    },
                    balancing: { h_plus_count: 0, h2o_count: 0 } // Wird in V1.0 eh dynamisch berechnet!
                };
                
                // Füge ein Komma am Ende hinzu, damit es nahtlos in die DB passt
                document.getElementById('json-output').value = JSON.stringify(entry, null, 2) + ",";
            } catch (e) {
                alert("Fehler beim Erstellen! Hast du alle Felder ausgefüllt?\n" + e);
            }
        }
    </script>
</body>
</html>
